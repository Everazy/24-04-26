<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Kamu ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      text-align: center;
    }
    .card {
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 400px;
    }
    h1 {
      font-size: 28px;
    }
    p {
      font-size: 18px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff6f91;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    .hidden {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hai Sayang ❤️</h1>
    <p>Aku cuma mau bilang sesuatu...</p>
    <button onclick="showMessage()">Klik disini</button>
    <p id="message" class="hidden">Aku sayang banget sama kamu 💕<br>Terima kasih sudah hadir di hidup aku 🌹</p>
  </div>

  <script>
    function showMessage() {
      document.getElementById('message').classList.remove('hidden');
    }
  </script>
</body>
</html>
