<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>
<style>
body { margin:0; font-family: Arial; background:#111; color:white; text-align:center; }
.page { display:none; padding:20px; }
.active { display:block; }
button { padding:10px 20px; margin-top:20px; border:none; border-radius:10px; background:#ff4d6d; color:white; cursor:pointer; }

/* Page 1 */
.envelope { width:200px; height:120px; background:#ff6f91; margin:100px auto; position:relative; cursor:pointer; }
.envelope:before {
 content:'';
 position:absolute;
 top:0;
 left:0;
 width:0;
 height:0;
 border-left:100px solid transparent;
 border-right:100px solid transparent;
 border-bottom:60px solid #ff8fab;
}
.letter { display:none; background:white; color:black; padding:20px; margin-top:20px; border-radius:10px; }

/* Game */
.letters span { font-size:30px; margin:5px; padding:10px; background:#333; display:inline-block; cursor:pointer; }

/* Photo */
.hidden { display:none; }
img { max-width:80%; border-radius:20px; }
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h2>Klik suratnya ya ❤️</h2>
  <div class="envelope" onclick="openLetter()"></div>
  <div class="letter" id="letter">
    <p>Hai sayang... aku cuma mau bilang sesuatu 💌</p>
    <p>Aku bersyukur banget punya kamu ❤️</p>
    <button onclick="nextPage(2)">Lanjut</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h2>Susun kata: S A Y A N G</h2>
  <div class="letters" id="letters"></div>
  <p id="result"></p>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <h2>Video untuk kamu 🎥</h2>
  <video controls width="300">
    <source src="video.mp4" type="video/mp4">
  </video>
  <br>
  <button onclick="nextPage(4)">Lanjut</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
  <h2>Kenangan kita 📸</h2>
  <img src="foto.jpg" onclick="showText()">
  <div id="text" class="hidden">
    <p>Setiap momen sama kamu itu berharga ❤️</p>
    <button onclick="nextPage(5)">Lanjut</button>
  </div>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
  <h2>Terima kasih ❤️</h2>
  <p>Aku sayang kamu, sekarang dan selamanya 💖</p>
</div>

<script>
function nextPage(n){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById('page'+n).classList.add('active');
}

function openLetter(){
 document.getElementById('letter').style.display='block';
}

// GAME
let target = "SAYANG";
let shuffled = target.split('').sort(()=>0.5-Math.random());
let current = "";

let lettersDiv = document.getElementById('letters');
shuffled.forEach(l=>{
 let span = document.createElement('span');
 span.innerText = l;
 span.onclick = ()=>{
   current += l;
   span.style.visibility='hidden';
   checkWord();
 }
 lettersDiv.appendChild(span);
});

function checkWord(){
 if(current.length === target.length){
   if(current === target){
     document.getElementById('result').innerHTML = "Benar! ❤️";
     setTimeout(()=>nextPage(3),1000);
   } else {
     document.getElementById('result').innerHTML = "Salah, coba lagi 😢";
     setTimeout(()=>location.reload(),1000);
   }
 }
}

function showText(){
 document.getElementById('text').classList.remove('hidden');
}
</script>

</body>
</html>

<!--
CATATAN:
- Ganti "video.mp4" dengan file video kamu (upload ke GitHub atau Vercel)
- Ganti "foto.jpg" dengan foto kalian
- Bisa di deploy ke Vercel seperti sebelumnya
-->
