<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body { margin:0; font-family:'Poppins', sans-serif; color:white; overflow:hidden; }
h2 { font-family:'Pacifico', cursive; }

.page {
 display:none;
 height:100vh;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 text-align:center;
 padding:20px;
 position:relative;
}
.active {
 display:flex;
 animation: fadeSmooth 1.2s ease;
}

@keyframes fadeSmooth {
 from{opacity:0; transform:scale(0.96);} 
 to{opacity:1; transform:scale(1);} 
}

button {
 padding:12px 24px;
 border:none;
 border-radius:30px;
 background:linear-gradient(45deg,#ff4d6d,#ff758f);
 color:white;
 cursor:pointer;
 box-shadow:0 8px 20px rgba(0,0,0,0.3);
 transition:0.3s;
}
button:hover { transform:scale(1.08); }

/* Floating hearts */
.heart {
 position:absolute;
 bottom:-20px;
 font-size:16px;
 animation: floatUp 6s linear infinite;
 opacity:0.7;
}
@keyframes floatUp {
 to { transform: translateY(-110vh); opacity:0; }
}

/* Cats decoration */
.cat {
 position:absolute;
 width:55px;
 opacity:0.5;
 filter:drop-shadow(0 5px 10px rgba(0,0,0,0.2));
}
.cat.top-left { top:15px; left:15px; }
.cat.bottom-right { bottom:15px; right:15px; }

/* Page backgrounds */
#page1{background:linear-gradient(135deg,#ff9a9e,#fad0c4);} 
#page2{background:linear-gradient(135deg,#a18cd1,#fbc2eb);} 
#page3{background:linear-gradient(135deg,#fbc2eb,#a6c1ee);} 
#page4{background:linear-gradient(135deg,#ffecd2,#fcb69f);} 
#page5{background:linear-gradient(135deg,#cfd9df,#e2ebf0); color:black;} 
#page6{background:linear-gradient(135deg,#ff9a9e,#fecfef);} 

/* Page 1 */
.main-img {
 width:230px;
 border-radius:25px;
 cursor:pointer;
 animation:pulse 1.5s infinite;
 box-shadow:0 15px 40px rgba(0,0,0,0.3);
}
@keyframes pulse {
 0%{transform:scale(1);} 
 50%{transform:scale(1.1);} 
 100%{transform:scale(1);} 
}

/* Game */
.game-box {
 background:white;
 color:black;
 padding:30px;
 border-radius:30px;
 width:320px;
 box-shadow:0 15px 40px rgba(0,0,0,0.25);
}
.title-big { font-size:30px; font-weight:700; }
.word {
 font-size:28px;
 font-family:'Pacifico';
 color:#ff4d6d;
 letter-spacing:6px;
 margin-bottom:15px;
}
.letters span {
 display:inline-block;
 padding:12px;
 margin:6px;
 border-radius:14px;
 background:#eee;
 cursor:pointer;
 transition:0.3s;
}
.letters span:hover { transform:scale(1.2) rotate(5deg); }
.letters span.selected { background:#ff4d6d; color:white; }

/* Video */
.video-box {
 background:white;
 padding:25px;
 border-radius:35px;
 box-shadow:0 20px 50px rgba(0,0,0,0.3);
 position:relative;
}
.video-box img.decor {
 position:absolute;
 width:60px;
 top:-25px;
 right:-25px;
}
video { width:380px; border-radius:20px; }

.hidden{display:none}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <img src="cat1.png" class="cat top-left">
  <img src="cat2.png" class="cat bottom-right">
  <h2>Klik suratnya ya ❤️</h2>
  <img src="cover.jpg" class="main-img" onclick="nextPage(2)">
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <img src="cat1.png" class="cat top-left">
  <h2 class="title-big">Susun Kata</h2>
  <div class="game-box">
    <div class="word">SAYANG</div>
    <div class="letters" id="letters"></div>
    <p id="result"></p>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <img src="cat2.png" class="cat bottom-right">
  <h2>Video untuk kamu 🎥</h2>
  <div class="video-box">
    <img src="flower.png" class="decor">
    <video controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
  <button onclick="nextPage(4)">Lanjut</button>
</div>

<script>
function nextPage(n){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById('page'+n).classList.add('active');
}

// floating hearts
setInterval(()=>{
 let h=document.createElement('div');
 h.className='heart';
 h.innerText='❤️';
 h.style.left=Math.random()*100+'vw';
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},400);

// GAME
let target="SAYANG";
let current="";
let lettersDiv=document.getElementById('letters');
target.split('').sort(()=>0.5-Math.random()).forEach((l,i)=>{
 setTimeout(()=>{
  let span=document.createElement('span');
  span.innerText=l;
  span.onclick=()=>{
   current+=l;
   span.classList.add('selected');
   checkWord();
  }
  lettersDiv.appendChild(span);
 }, i*150);
});

function resetGame(){ current=""; document.querySelectorAll('.letters span').forEach(s=>s.classList.remove('selected')); }
function checkWord(){
 if(current.length===target.length){
   if(current===target){ document.getElementById('result').innerText="Benar ❤️"; setTimeout(()=>nextPage(3),1000); }
   else { document.getElementById('result').innerText="Salah 😢"; setTimeout(resetGame,1000); }
 }
}
</script>

</body>
</html>
