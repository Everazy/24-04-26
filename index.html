<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>
<style>
body { margin:0; font-family: Arial; background:#111; color:white; text-align:center; overflow:hidden; }
.page { display:none; padding:20px; }
.active { display:block; }
button { padding:10px 20px; margin-top:20px; border:none; border-radius:10px; background:#ff4d6d; color:white; cursor:pointer; }

/* Floating hearts */
.heart {
 position: fixed;
 bottom: -10px;
 font-size: 20px;
 animation: floatUp 5s linear infinite;
}
@keyframes floatUp {
 0% { transform: translateY(0); opacity:1; }
 100% { transform: translateY(-100vh); opacity:0; }
}

/* Page 1 envelope */
.envelope { width:200px; height:120px; background:#ff6f91; margin:100px auto; position:relative; cursor:pointer; transition: transform 0.5s; }
.envelope:hover { transform: scale(1.1); }
.envelope:before {
 content:'';
 position:absolute;
 top:0;
 left:0;
 width:0;
 height:0;
 border-left:100px solid transparent;
 border-right:100px solid transparent;
 border-bottom:60px solid #ff8fab;
}
.letter { display:none; background:white; color:black; padding:20px; margin-top:20px; border-radius:10px; animation: fadeIn 1s; }

@keyframes fadeIn {
 from { opacity:0; transform: translateY(20px);} 
 to { opacity:1; transform: translateY(0);} 
}

/* Game */
.letters span { font-size:30px; margin:5px; padding:10px; background:#333; display:inline-block; cursor:pointer; border-radius:10px; transition:0.3s; }
.letters span:hover { background:#ff4d6d; transform: scale(1.2); }

/* Photo */
.hidden { display:none; }
img { max-width:80%; border-radius:20px; cursor:pointer; transition:0.5s; }
img:hover { transform: scale(1.05); }
</style>
</head>
<body>

<!-- Floating hearts container -->
<div id="hearts"></div>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h2>Klik suratnya ya ❤️</h2>
  <div class="envelope" onclick="openLetter()"></div>
  <div class="letter" id="letter">
    <p>Hai sayang... aku cuma mau bilang sesuatu 💌</p>
    <p>Aku bersyukur banget punya kamu ❤️</p>
    <button onclick="nextPage(2)">Lanjut</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h2>Susun kata: S A Y A N G</h2>
  <div class="letters" id="letters"></div>
  <p id="result"></p>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <h2>Video untuk kamu 🎥</h2>
  <video controls width="300">
    <source src="video.mp4" type="video/mp4">
  </video>
  <br>
  <button onclick="nextPage(4)">Lanjut</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
  <h2>Kenangan kita 📸</h2>
  <img src="foto.jpg" onclick="showText()">
  <div id="text" class="hidden">
    <p style="animation: fadeIn 1s;">Setiap momen sama kamu itu berharga ❤️</p>
    <button onclick="nextPage(5)">Lanjut</button>
  </div>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
  <h2 style="animation: fadeIn 2s;">Terima kasih ❤️</h2>
  <p style="animation: fadeIn 3s;">Aku sayang kamu, sekarang dan selamanya 💖</p>
</div>

<script>
function nextPage(n){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById('page'+n).classList.add('active');
}

function openLetter(){
 document.getElementById('letter').style.display='block';
}

// Floating hearts generator
function createHeart(){
 const heart = document.createElement('div');
 heart.classList.add('heart');
 heart.innerText = '❤️';
 heart.style.left = Math.random()*100 + 'vw';
 heart.style.fontSize = (Math.random()*20 + 10) + 'px';
 document.body.appendChild(heart);
 setTimeout(()=>heart.remove(),5000);
}
setInterval(createHeart, 300);

// GAME
let target = "SAYANG";
let shuffled = target.split('').sort(()=>0.5-Math.random());
let current = "";

let lettersDiv = document.getElementById('letters');
shuffled.forEach(l=>{
 let span = document.createElement('span');
 span.innerText = l;
 span.onclick = ()=>{
   current += l;
   span.style.visibility='hidden';
   checkWord();
 }
 lettersDiv.appendChild(span);
});

function checkWord(){
 if(current.length === target.length){
   if(current === target){
     document.getElementById('result').innerHTML = "Benar! ❤️";
     setTimeout(()=>nextPage(3),1000);
   } else {
     document.getElementById('result').innerHTML = "Salah, coba lagi 😢";
     setTimeout(()=>location.reload(),1000);
   }
 }
}

function showText(){
 document.getElementById('text').classList.remove('hidden');
}
</script>

</body>
</html>
